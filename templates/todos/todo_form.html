{% extends "base.html" %}

{% block title %}{% if is_edit_mode %}编辑待办{% else %}新建待办{% endif %}{% endblock %}

{% block content %}
<section class="form-card">
    <h2>{% if is_edit_mode %}编辑待办{% else %}新建待办{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit">保存</button>
            <a href="{% url 'todos:list' %}">返回列表</a>
        </div>
    </form>
</section>
{% endblock %}
